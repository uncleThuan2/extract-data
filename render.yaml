services:
  - type: web
    name: extract-data-bot
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py telegram
    plan: free
    healthCheckPath: /health

    envVars:
      - key: AI_PROVIDER
        sync: false        # hoặc gemini / copilot

      # Điền các giá trị bí mật trực tiếp trong Render Dashboard
      # (hoặc dùng fromGroup nếu bạn tạo Environment Group)
      # - key: OPENAI_API_KEY
      #   sync: false
      - key: GEMINI_API_KEY
        sync: false
       # Tuỳ chỉnh model / chunk nếu cần
      - key: LLM_MODEL
        sync: false
      - key: EMBEDDING_MODEL
        sync: false
      - key: EMBEDDING_DIMENSION
        sync: false
      # - key: GITHUB_TOKEN
      #   sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: PORT
        sync: false

      - key: CHUNK_SIZE
        sync: false
      - key: CHUNK_OVERLAP
        sync: false
